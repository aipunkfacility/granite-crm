  dgis:
    enabled: false
    max_retries: 3
    search_category: "изготовление памятников"
    # Phase 7: Переписан на Crawlee + 2GIS Catalog API.
    # Два режима: API (при наличии DGIS_API_KEY) и Crawlee BeautifulSoupCrawler (fallback).
    # API mode: пагинация через параметр page, anti-bot через escalating backoff при 403/429.
    # Crawlee mode: парсинг страницы результатов, без пагинации (max_requests_per_crawl=1).
    api_key: ""                  # из .env: DGIS_API_KEY (приоритетнее env)
    max_pages: 5                 # страниц пагинации (API mode)
    delay: 1.5                   # секунд между запросами к API

  yell:
    enabled: false
    max_retries: 3
    base_path: "/catalog/izgotovlenie_pamyatnikov/"
    # Phase 7: Переписан на Crawlee PlaywrightCrawler.
    # Управляет собственным браузером (НЕ требует внешнего playwright_page).
    # Пагинация через кнопку «Показать ещё», случайная задержка между кликами.
    # Категории берутся из category_finder (приоритет) или base_path (fallback).
    max_pages: 5                 # страниц пагинации («Показать ещё»)
    delay: 2.0                   # секунд между действиями

  jsprav_playwright:
    enabled: true  # авто-fallback: запускается если JspravScraper не добрал компании

  google_maps:
    enabled: false
    max_retries: 5
    grid_step_km: 5
    queries:
      - "гранитная мастерская"
      - "изготовление памятников"
      - "ритуальные услуги памятники"

  avito:
    enabled: false
    max_retries: 2
    category_path: "/uslugi/ritualnye_uslugi"

# ===== Crawlee (session pool, proxy) =====
# Общие настройки для Crawlee-based скраперов (2GIS, Yell).
# Session pool управляет куками и ротацией сессий.
# При 403/429/captcha сессия помечается как заблокированная и ротируется.
# Proxy rotation включается при заданном proxy_url.
crawlee:
  use_session_pool: true       # включить управление сессиями (cookies, rotation)
  max_session_rotations: 10    # макс. ротаций сессии перед остановкой
  proxy_url: ""                # URL прокси (или из .env: CRAWLEE_PROXY_URL)

# ===== Дедупликация =====
dedup:
  name_similarity_threshold: 88
  phone_match_required: true
  auto_merge_same_phone: true
  auto_merge_same_site: true
  needs_review_on_address_diff: true
  network_phone_threshold: 10   # телефоны у >= N компаний исключаются из phone-кластеризации

# ===== Обогащение =====
enrichment:
  # WebClient: используется для точечного веб-поиска в enrichment_phase
  web_client:
    timeout: 60
    search_limit: 3
    search_delay: 2.0  # секунд — задержка между Google SERP запросами (rate limiting)

  # Параллелизация: кол-во потоков для обогащения (1 = последовательно)
  max_concurrent: 3

  # Async HTTP: включить async-режим обогащения (httpx.AsyncClient + asyncio)
  # Если false — используется ThreadPoolExecutor (legacy sync)
  # Если true — используется asyncio.Semaphore + httpx.AsyncClient (быстрее)
  async_enabled: false

  # Батч: flush каждые N enriched-записей в enrichment_phase
  batch_flush: 50

  # Network detector: порог для определения сети филиалов
  network_threshold: 2

  # Telegram: общие настройки
  tg_finder:
    check_delay: 1.5
    max_retries: 5
    initial_backoff: 5  # секунд — начальная выдержка при 429
    request_timeout: 10  # секунд
    google_search_enabled: true
    website_check_enabled: true

  tg_trust:
    empty_profile_penalty: -5
    check_delay_min: 1.0  # adaptive_delay min для check_tg_trust
    check_delay_max: 2.0

  tech_keywords:
    equipment:
      - "лазерный станок"
      - "ЧПУ"
      - "CNC"
      - "фрезерный станок"
      - "гравировальный станок"
      - "Сауно"
      - "Миртелс"
      - "Trotec"
      - "Epilog"
      - "лазерная гравировка"
      - "станок с ЧПУ"

    production:
      - "собственное производство"
      - "цех"
      - "производственная база"
      - "изготовление на заказ"
      - "работаем с гранитом"
      - "производство памятников"
      - "гранитная мастерская"

    portrait:
      - "ретушь фото"
      - "обработка портретов"
      - "фото на памятник"
      - "коррекция фото"
      - "цветная печать на граните"
      - "портрет на памятник"

    site_constructor:
      - "tilda"
      - "tildaweb"
      - "wix.com"
      - "ucoz"
      - "narod.ru"
      - "jimdo"
      - "weebly"
      - "wordpress.com"

  # Reverse Lookup (Фаза 6): поиск в 2GIS и Yell для компаний с малым количеством данных.
  # Запускается ПОСЛЕ основного обогащения, ПЕРЕД детекцией сетей.
  # Кандидаты: нет мессенджеров, нет email, crm_score < min_crm_score.
  # Данные сливаются с существующими (union, без перезаписи).
  # По умолчанию выключен для тестирования.
  reverse_lookup:
    enabled: true           # D1: enabled for production
    sources:
      dgis:
        enabled: false      # D1: NO 2GIS
        api_key: ""         # from .env: DGIS_API_KEY. Приоритет: config > env.
        max_requests_per_day: 100  # бесплатный tier 2GIS: 1000/день, оставляем запас
      yell:
        enabled: true       # D1: enabled
        max_requests_per_day: 50    # Yell не имеет API, запросы через Crawlee
    min_crm_score: 5        # D1: lowered threshold
    delay_between_requests: 2.0  # секунд между запросами (с jitter ±30%)

# ===== Priority Score =====
# AUDIT #8, #17, #18, #24: Расширенная конфигурация скоринга.
# Новые секции: tld_penalties, tech_weights, has_address.
scoring:
  weights:
    has_website: 5
    cms_bitrix: 10
    cms_modern: 3
    has_marquiz: 8
    has_telegram: 15
    has_whatsapp: 10
    tg_trust_multiplier: 3   # E2: trust_score tiers: 0→bot(-10), 1→3pts, 2→6pts, 3→9pts
    multiple_phones: 5
    has_email: 5
    is_network: 5
    has_address: 5          # AUDIT #5: Физический адрес = реальная мастерская
    all_non_local_phones_penalty: 5  # E1: штраф за все нелокальные телефоны
  # AUDIT #17: TLD-штрафы перенесены из hardcoded в config.
  # Каждый элемент: {tld: "<домен>", penalty: <баллы>}
  # .com/.net/.org получают мягкий штраф (-3), .kz/.by — жёсткий (-5).
  tld_penalties:
    - tld: ".kz"
      penalty: -5
    - tld: ".by"
      penalty: -5
    - tld: ".com"
      penalty: -3
    - tld: ".net"
      penalty: -3
    - tld: ".org"
      penalty: -3
    - tld: ".biz"
      penalty: -5
  # AUDIT #8: Веса для tech_keywords (обнаруживаются TechExtractor).
  # production/equipment — высокие баллы (производство).
  # site_constructor — отрицательный (признак кустарного сайта).
  tech_weights:
    production: 8         # «Собственное производство»
    equipment: 5          # «ЧПУ», «лазерный станок»
    portrait: 2           # «Фото на памятник»
    site_constructor: -3  # ucoz/narod — признак кустарного сайта
  # AUDIT #18: Пороги сегментов снижены для лучшего распределения.
  # Ранее A≥50 был достижим только для ~3% компаний.
  # Новые пороги дают ~8% A, ~20% B (см. аудит 5).
  levels:
    segment_A: 40
    segment_B: 25
    segment_C: 15

# ===== Экспорт: Smart Filters / Presets =====
export_presets:
  hot_leads:
    description: "Есть TG/WA + высокий CRM-скор"
    filters: "telegram IS NOT NULL AND crm_score >= 50"
    format: "csv"

  high_score:
    description: "Высокий CRM-скор (сегмент A)"
    filters: "segment = 'A'"
    format: "csv"

  with_telegram:
    description: "Все компании с найденным Telegram"
    filters: "telegram IS NOT NULL"
    format: "csv"

  cold_email:
    description: "Нет мессенджеров, но есть Email"
    filters: "telegram IS NULL AND whatsapp IS NULL AND emails IS NOT NULL"
    format: "csv"

  manual_search:
    description: "Нет мессенджеров — нужен прозвон"
    filters: "telegram IS NULL AND whatsapp IS NULL"
    format: "markdown"

  full_dump:
    description: "Все обогащённые компании"
    filters: "1=1"
    format: "csv"

# ===== Логирование =====
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level:<7} | {name}:{function}:{line} | {message}"
  rotation: "10 MB"
  retention: "30 days"
  cities_log: true

# ===== База данных =====
database:
  path: "data/granite.db"
