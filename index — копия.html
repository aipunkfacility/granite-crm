<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini CRM</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://unpkg.com/dexie@3.2.7/dist/dexie.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<link rel="stylesheet" href="css/styles.css?v=5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="fl fl-col" style="height:100vh">

<div id="pageAreas" class="fl fl-col" style="height:100vh">
  <header class="px4 py3 fl ac gap3">
    <h1 style="font-size:15px;font-weight:800;color:var(--hd);display:flex;align-items:center;gap:8px;letter-spacing:-.01em">
      <i class="ri-contacts-book-2-fill" style="color:var(--acc);font-size:18px"></i> Mini CRM
    </h1>
    <div class="f1"></div>
    <span id="serverStatusDot" class="status-dot" title="Проверка сервера..."></span>
    <button class="btn-icon" onclick="toggleTheme()" title="Сменить тему">
      <i class="ri-moon-clear-fill" id="themeBtn"></i>
    </button>
    <button class="btn btn-p" onclick="ImportExport.openUpload()">
      <i class="ri-folder-upload-line"></i> Импорт
    </button>
    <button class="btn btn-s" onclick="BackupManager.openModal()" title="Бекапы">
      <i class="ri-history-line"></i>
    </button>
  </header>
  <main class="f1 oa" id="areasList"></main>
</div>

<div id="pageContacts" class="fl fl-col" style="display:none;height:100vh">
  <header class="px4 py2 fl ac gap3">
    <button class="btn-icon" onclick="State.goAreas()" title="Назад к областям">
      <i class="ri-arrow-left-line"></i>
    </button>
    <h2 id="areaTitle" style="font-size:15px;font-weight:800;color:var(--hd);letter-spacing:-.01em"></h2>
    <div class="f1"></div>
    <div class="rel">
      <i class="ri-search-line abs" style="left:8px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:13px"></i>
      <input type="text" id="searchInp" class="inp" style="padding-left:30px;width:160px" placeholder="Поиск...">
    </div>
    <button class="btn btn-s" onclick="ImportExport.doExport('all')" title="Экспорт в Excel">
      <i class="ri-file-download-line"></i>
    </button>
    <div class="rel">
      <button class="btn-icon" onclick="toggleSettingsDD(event)" title="Настройки">
        <i class="ri-settings-3-line"></i>
      </button>
      <div id="settingsDD" class="dropdown-menu" style="display:none">
        <div class="dropdown-section">
          <div class="dropdown-section-title">Показывать поля</div>
          <div id="fieldTogglesDD" class="dropdown-toggles"></div>
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item" onclick="BackupManager.openModal(State.currentArea);toggleSettingsDD(event)">
          <i class="ri-history-line"></i> Восстановить из бекапа
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item" onclick="toggleTheme();toggleSettingsDD(event)">
          <i class="ri-moon-line"></i> Сменить тему
        </div>
      </div>
    </div>
    <button class="btn btn-p" onclick="EmailSender.triggerSend()" title="Email рассылка выбранным" id="emailSendHeaderBtn">
      <i class="ri-mail-send-line"></i>
      <span id="emailServerDot" class="status-dot" title="Проверка сервера..."></span>
    </button>
  </header>
  <div id="channelTabs" class="ch-tabs"></div>
  <main class="f1 oa" id="checklistContainer"></main>
  <footer id="statsFooter" class="stats-footer" style="display:none">
    <div class="stats-bar" id="statsBar"></div>
  </footer>
</div>

<div id="uploadModal" class="ov" style="display:none"></div>
<div id="emailModal" class="ov" style="display:none"></div>
<div id="backupModal" class="ov" style="display:none"></div>

<script src="js/utils.js?v=5"></script>
<script src="js/state.js?v=5"></script>
<script src="js/db.js?v=5"></script>
<script src="js/render.js?v=5"></script>
<script src="js/batch.js?v=5"></script>
<script src="js/import-export.js?v=5"></script>
<script src="js/email-sender.js?v=5"></script>
<script src="js/backup-manager.js?v=5"></script>

<script>
function toggleTheme() {
  document.documentElement.classList.toggle('light');
  localStorage.setItem('crm-t', document.documentElement.classList.contains('light') ? 'l' : 'd');
  syncThemeIcons();
}
function syncThemeIcons() {
  const isLight = document.documentElement.classList.contains('light');
  document.querySelectorAll('#themeBtn, [onclick="toggleTheme()"] i').forEach(e => {
    e.className = isLight ? 'ri-moon-line' : 'ri-moon-clear-fill';
  });
}
if (localStorage.getItem('crm-t') === 'l') {
  document.documentElement.classList.add('light');
}
function toggleField(k) {
  State.toggleField(k);
  Render.renderFieldToggles();
  Render.renderChecklist();
}
function toggleSettingsDD(e) {
  e.stopPropagation();
  const d = document.getElementById('settingsDD');
  d.style.display = d.style.display === 'block' ? 'none' : 'block';
  if (d.style.display === 'block') {
    Render.renderFieldToggles();
  }
}
document.addEventListener('click', function (e) {
  if (!e.target.closest('#settingsDD') && !e.target.closest('[onclick*="toggleSettingsDD"]')) {
    const d = document.getElementById('settingsDD');
    if (d) d.style.display = 'none';
  }
});
document.addEventListener('DOMContentLoaded', async function () {
  try {
    syncThemeIcons();
    await initDB();
    await loadFromServer();
    console.log('DB ready:', await db.contacts.count());
    Render.renderAreas();
    const searchInp = document.getElementById('searchInp');
    const debouncedSearch = debounce(function (e) {
      State.setSearch(e.target.value);
      Render.renderChecklist();
    }, SEARCH_DEBOUNCE_MS);
    searchInp.addEventListener('input', debouncedSearch);
    EmailSender.checkServer().then(ok => {
      const dot = document.getElementById('emailServerDot');
      if (dot) {
        dot.className = 'status-dot' + (ok ? ' status-ok' : ' status-err');
        dot.title = ok ? 'Сервер запущен' : 'Сервер не запущен';
      }
      const mainDot = document.getElementById('serverStatusDot');
      if (mainDot) {
        mainDot.className = 'status-dot' + (ok ? ' status-ok' : ' status-err');
        mainDot.title = ok ? 'Сервер запущен' : 'Сервер не запущен';
      }
    });
  } catch (err) {
    console.error(err);
    document.getElementById('areasList').innerHTML = '<div class="empty-state"><i class="ri-error-warning-line"></i><div class="empty-state-title">Ошибка БД</div><div class="empty-state-desc">' + esc(err.message) + '</div></div>';
  }
});
</script>
</body>
</html>
