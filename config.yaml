# Granite CRM configuration
# No schema validation — malformed config will fail at runtime

# ===== Города =====
# Список городов перенесён в data/regions.yaml (источник истины).
# Команда `run <город>` — скрапинг одного города.
# Команда `run <регион>` — скрапинг всех городов региона.
# Команда `run all` — скрапинг всех 1098 городов (1093 уникальных,
# 5 дублирующихся названий в разных регионах).

# ===== Общие настройки скрапинга =====
scraping:
  request_delay: 1.5
  timeout: 15
  max_retries: 3
  retry_min_wait: 2
  retry_max_wait: 30
  user_agent_rotation: true
  max_threads: 3
  failed_domain_cache_ttl: 600  # секунд — кэш недоступных доменов в web_search
  inter_city_delay: 2           # секунд — пауза между городами (0 = без паузы)

# ===== Настройки источников =====
sources:
  web_search:
    enabled: true
    max_retries: 3
    search_limit: 10
    queries:
      - "гранитная мастерская памятники"
      - "производство памятников гранит"
      - "мастерская по изготовлению памятников"
      - "гранит памятники надгробия"
      - "изготовление памятников из гранита"

  jsprav:
    enabled: true
    max_retries: 3
    method: "jsonld"
    backoff_base: 5            # базовая задержка при 429/503 (секунд)
    backoff_max: 60            # максимальная задержка при 429/503 (секунд)
    playwright_threshold: 0.9  # порог для PW fallback (доля от declared_total)
    categories:
      - "izgotovlenie-i-ustanovka-pamyatnikov-i-nadgrobij"
    subdomain_map:
